<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login</title>
  <style>
    body{display:flex;align-items:center;justify-content:center;height:100vh;font-family:Arial,Helvetica,sans-serif;background:#f7f7f7}
    .login{background:white;padding:24px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,0.06);width:320px}
    .login h1{font-size:20px;margin:0 0 12px}
    .login label{display:block;margin:8px 0 4px;font-size:13px}
    .login input{width:100%;padding:8px 10px;border:1px solid #dcdcdc;border-radius:6px}
    .login button{width:100%;margin-top:12px;padding:10px;border:0;background:#333;color:white;border-radius:6px}
    .meta{margin-top:10px;text-align:center;font-size:13px}
    a{color:#0366d6;text-decoration:none}
  </style>
</head>
<body>
  <div class="login">
    <h1>Sign in</h1>
    {% if messages %}
      {% for message in messages %}
        <div style="background:#fdecea;color:#611a15;padding:8px;border-radius:6px;margin-bottom:8px">{{ message }}</div>
      {% endfor %}
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <label for="id_username">Username</label>
      <input id="id_username" name="username" type="text" required autofocus>
      <label for="id_password">Password</label>
      <input id="id_password" name="password" type="password" required>
      <button type="submit">Log in</button>
    </form>
    <div class="meta">
      <div>Don't have an account? <a href="{% url 'register' %}">Register</a></div>
      <div style="margin-top:6px"><a href="{% url 'home' %}">Back to Home</a></div>
    </div>
  </div>
</body>
</html>
