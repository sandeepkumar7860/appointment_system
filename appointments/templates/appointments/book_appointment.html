<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { margin: 20px; border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card-img-top { height: 200px; object-fit: cover; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center my-4">Book Appointment with {{ teacher.name }}</h1>
        <div class="card">
            <img src="{{ teacher.avatar_url }}" class="card-img-top" alt="{{ teacher.name }}">
            <div class="card-body">
                <h5 class="card-title">{{ teacher.name }}</h5>
                <p class="card-text">Subject: {{ teacher.subject }}</p>
            </div>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="date" class="form-label">Select Date</label>
                <input type="date" class="form-control" id="date" name="date" required>
            </div>
            <div class="mb-3">
                <label for="time_slot" class="form-label">Select Time Slot</label>
                <select class="form-select" id="time_slot" name="time_slot" required>
                    <option value="8-9">8-9</option>
                    <option value="9-10">9-10</option>
                    <option value="10-11">10-11</option>
                    <option value="11-12">11-12</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Book Appointment</button>
        </form>
        <a href="{% url 'teacher_list' %}" class="btn btn-secondary mt-4">Back to Teachers</a>
        <a href="{% url 'logout' %}" class="btn btn-danger mt-4 ms-2">Logout</a>
    </div>
    <footer style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 0; margin-top: 50px;">
        <div class="container text-center">
            <h5>Teacher Appointment System</h5>
            <p>Address: Sector 62, Noida</p>
            <p>Phone: 8002355251</p>
            <p>&copy; 2026 Teacher Appointment System. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
